name : Postman Collection Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: 30 02 * * *
    - cron: 00 16 * * *
    - cron: 00 06 * * 1-5

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6.0.2

      - name: Install Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'

      - name: Install npm and newman
        run:  |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run the Postman Collection with newman
        run:  |
          newman run 'Inwarrenty Flow Collection.postman_collection.json' \
          -e QA.postman_environment.json \
          -r htmlextra,cli \
          --reporter-htmlextra-export ./newman/index.html
          
      - name:  Upload Newman Report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: Newman Report
          path: newman/*.html

      - name: Creating github Page branches
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with: 
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/

      - name: Sending Mail from Github
        if: always()
        uses: dawidd6/action-send-mail@v14
        with: 
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Phoneix Inwarrenty Flow Execution Results
          to: satheeshiniyan8723@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
                Hi,

                Please find the Phoneix InWarrenty Flow Execution Results
                Please Find the Link: https://satheeshg3293.github.io/Phoenix-Inwarranty-Flow-Collection/

                Regards
                Satheesh Kumar G
        
        






        
